<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Time | Portal</title>
    <style>
        /* ================= НАСТРОЙКИ И ЦВЕТА ================= */
        :root {
            --primary: #a855f7;
            --primary-glow: rgba(168, 85, 247, 0.6);
            --bg: #0a0a0c;
            --glass: rgba(168, 85, 247, 0.08);
            --glass-border: rgba(168, 85, 247, 0.25);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { 
            height: 100%; overflow: hidden; 
            background: var(--bg); font-family: 'Segoe UI', Roboto, sans-serif; color: white; 
        }

        /* ================= ФОН (КАНВАС) ================= */
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }

        /* ================= ГЛАВНЫЙ КОНТЕЙНЕР ================= */
        .main-wrapper { 
            position: relative; z-index: 2; min-height: 100vh; 
            display: flex; align-items: center; justify-content: center; padding: 20px; 
        }

        /* ================= ЛИКВИД ГЛАСС ================= */
        .glass-panel { 
            background: var(--glass); 
            backdrop-filter: blur(25px); -webkit-backdrop-filter: blur(25px);
            border: 1px solid var(--glass-border); 
            padding: 35px 30px; 
            border-radius: 40px;
            box-shadow: 0 25px 60px rgba(0, 0, 0, 0.8), inset 0 0 20px rgba(168, 85, 247, 0.1); 
            width: 100%; max-width: 500px; text-align: center;
            display: flex; flex-direction: column; gap: 20px;
        }

        h1 { 
            font-size: clamp(2rem, 8vw, 2.8rem); text-transform: uppercase; 
            color: var(--primary); text-shadow: 0 0 25px var(--primary-glow); 
            letter-spacing: 2px; line-height: 1.1; margin-bottom: 5px;
        }
        .admin-tag { color: #888; font-size: 0.8rem; letter-spacing: 3px; margin-bottom: 10px; }

        /* ================= ВКЛАДКИ (НАВИГАЦИЯ) ================= */
        .tabs-nav {
            display: flex; justify-content: center; gap: 10px; background: rgba(0,0,0,0.4);
            padding: 8px; border-radius: 20px; margin-bottom: 15px;
        }
        .tab-btn {
            flex: 1; background: transparent; color: #888; border: none; padding: 10px;
            border-radius: 15px; cursor: pointer; font-weight: bold; transition: 0.3s;
            text-transform: uppercase; font-size: 0.85rem;
        }
        .tab-btn.active { background: rgba(168, 85, 247, 0.2); color: white; box-shadow: 0 0 10px var(--primary-glow); }
        .tab-content { display: none; animation: fadeIn 0.4s ease; }
        .tab-content.active { display: block; }

        @keyframes fadeIn { from { opacity: 0; transform: translateY(10px); } to { opacity: 1; transform: translateY(0); } }

        /* ================= КНОПКИ ================= */
        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { 
            background: rgba(168, 85, 247, 0.15); color: #fff; border: 1px solid var(--primary); 
            padding: 14px; cursor: pointer; border-radius: 15px; text-transform: uppercase; 
            font-weight: bold; transition: 0.3s; font-size: 0.8rem; letter-spacing: 1px;
            position: relative; overflow: hidden;
        }
        .btn:hover { background: var(--primary); transform: translateY(-3px); box-shadow: 0 8px 20px var(--primary-glow); }
        .btn:active { transform: translateY(0); }
        .btn-full { grid-column: span 2; }

        /* ================= СТАТУС СЕРВЕРА ================= */
        .status-box { 
            background: rgba(0,0,0,0.5); padding: 15px; border-radius: 20px; 
            display: flex; align-items: center; justify-content: center; gap: 12px;
            border: 1px solid rgba(255,255,255,0.05); margin-top: 10px;
        }
        #status-dot { width: 12px; height: 12px; border-radius: 50%; transition: 0.5s; }
        .online { background: #00ffaa; box-shadow: 0 0 15px #00ffaa; }
        .offline { background: #ff4444; box-shadow: 0 0 15px #ff4444; }
        #status-text { font-weight: bold; font-size: 1rem; letter-spacing: 1px; }

        /* ================= ИГРА: КУБИК ================= */
        .dice-game-wrapper {
            display: flex; flex-direction: column; align-items: center; gap: 30px; padding: 20px 0;
        }
        .dice {
            width: 100px; height: 100px; background: white; border-radius: 20px;
            box-shadow: inset 0 0 20px rgba(0,0,0,0.1), 0 15px 30px rgba(0,0,0,0.4);
            display: grid; padding: 15px; gap: 10px;
            grid-template-columns: repeat(3, 1fr); grid-template-rows: repeat(3, 1fr);
            transition: transform 0.1s;
        }
        .dot { background: #111; border-radius: 50%; width: 100%; height: 100%; box-shadow: inset 0 3px 5px rgba(0,0,0,0.5); opacity: 0; transition: opacity 0.2s; }
        
        /* Позиции точек на сетке */
        .dot.active { opacity: 1; }
        .dot-1 { grid-column: 2; grid-row: 2; } /* Центр */
        .dot-2 { grid-column: 1; grid-row: 1; } /* Левый верх */
        .dot-3 { grid-column: 3; grid-row: 3; } /* Правый низ */
        .dot-4 { grid-column: 3; grid-row: 1; } /* Правый верх */
        .dot-5 { grid-column: 1; grid-row: 3; } /* Левый низ */
        .dot-6 { grid-column: 1; grid-row: 2; } /* Левый центр */
        .dot-7 { grid-column: 3; grid-row: 2; } /* Правый центр */

        /* Анимация броска, как в ТГ */
        .rolling { animation: superRoll 1.2s cubic-bezier(0.2, 0.8, 0.2, 1) forwards; }
        @keyframes superRoll {
            0% { transform: scale(1) rotate(0deg) translateY(0); }
            30% { transform: scale(1.2) rotate(360deg) translateY(-50px); }
            70% { transform: scale(1.1) rotate(720deg) translateY(10px); }
            100% { transform: scale(1) rotate(1080deg) translateY(0); }
        }

        #dice-log { font-size: 1.2rem; color: #ccc; min-height: 30px; }

        /* ================= МОДАЛКА АДМИНОВ ================= */
        .overlay { 
            position: fixed; top: 0; left: 0; width: 100%; height: 100%; 
            background: rgba(0,0,0,0.85); z-index: 100; display: none; 
            align-items: center; justify-content: center; backdrop-filter: blur(8px); 
        }
        .modal { 
            background: #111; padding: 40px; border-radius: 30px; 
            border: 1px solid var(--primary); text-align: center; width: 90%; max-width: 400px; 
            box-shadow: 0 0 50px rgba(168, 85, 247, 0.2);
        }
        .modal h2 { color: var(--primary); margin-bottom: 25px; text-transform: uppercase; }
        .modal p { font-size: 1.1rem; margin-bottom: 15px; color: #ddd; }
        .modal b { color: white; }
    </style>
</head>
<body>

    <canvas id="canvas-container"></canvas>

    <div class="main-wrapper">
        <div class="glass-panel">
            
            <div>
                <h1>Mystery Time</h1>
                <div class="admin-tag">PORTAL INTERFACE</div>
            </div>

            <div class="tabs-nav">
                <button class="tab-btn active" onclick="switchTab('main')">Главная</button>
                <button class="tab-btn" onclick="switchTab('games')">Мини-игры</button>
            </div>

            <div id="tab-main" class="tab-content active">
                <div class="btn-grid">
                    <button class="btn btn-full" onclick="copyIP()" id="ip-btn">Копировать IP</button>
                    <button class="btn" onclick="toggleModal('admin-modal')">Админы</button>
                    <button class="btn" onclick="checkServer()">Пинг 🔄</button>
                </div>
                
                <div class="status-box">
                    <div id="status-dot" class="offline"></div>
                    <span id="status-text">ОЖИДАНИЕ ДАННЫХ...</span>
                </div>
            </div>

            <div id="tab-games" class="tab-content">
                <div class="dice-game-wrapper">
                    <div class="dice" id="dice-element">
                        <div class="dot dot-2" id="d-tl"></div> <div class="dot dot-4" id="d-tr"></div> <div class="dot dot-6" id="d-ml"></div> <div class="dot dot-1" id="d-cc"></div> <div class="dot dot-7" id="d-mr"></div> <div class="dot dot-5" id="d-bl"></div> <div class="dot dot-3" id="d-br"></div> </div>
                    <div id="dice-log">Жми бросок!</div>
                    <button class="btn btn-full" style="width: 100%" onclick="playDice()">БРОСИТЬ КУБИК 🎲</button>
                </div>
            </div>

        </div>
    </div>

    <div id="admin-modal" class="overlay" onclick="toggleModal('admin-modal')">
        <div class="modal" onclick="event.stopPropagation()">
            <h2>Администрация</h2>
            <p>👑 <b>Главный админ:</b><br>Smashh</p>
            <p>🛡️ <b>Админ:</b><br>Oscolo4ek</p>
            <br>
            <button class="btn btn-full" style="width: 100%; margin-top: 10px;" onclick="toggleModal('admin-modal')">ЗАКРЫТЬ</button>
        </div>
    </div>

    <script>
        // ================= 1. СИСТЕМА ВКЛАДОК =================
        function switchTab(tabId) {
            // Выключаем всё
            document.querySelectorAll('.tab-content').forEach(el => el.classList.remove('active'));
            document.querySelectorAll('.tab-btn').forEach(el => el.classList.remove('active'));
            // Включаем нужное
            document.getElementById('tab-' + tabId).classList.add('active');
            event.currentTarget.classList.add('active');
        }

        // ================= 2. ФОНОВЫЕ КРИСТАЛЛЫ (КАНВАС) =================
        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;

        window.addEventListener('resize', () => { 
            w = canvas.width = window.innerWidth; 
            h = canvas.height = window.innerHeight; 
        });

        class Crystal {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.size = Math.random() * 8 + 4; // Разный размер кристаллов
                this.vx = (Math.random() - 0.5) * 0.4;
                this.vy = (Math.random() - 0.5) * 0.4;
                this.angle = Math.random() * Math.PI * 2;
                this.spin = (Math.random() - 0.5) * 0.02; // Скорость вращения
                this.opacity = Math.random() * 0.5 + 0.1;
            }
            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.angle += this.spin;
                // Отскок от краев экрана
                if (this.x < 0 || this.x > w) this.vx *= -1;
                if (this.y < 0 || this.y > h) this.vy *= -1;
            }
            draw() {
                ctx.save();
                ctx.translate(this.x, this.y);
                ctx.rotate(this.angle);
                
                // Рисуем форму ромба (кристалла)
                ctx.beginPath();
                ctx.moveTo(0, -this.size);     // Верх
                ctx.lineTo(this.size/2, 0);    // Право
                ctx.lineTo(0, this.size);      // Низ
                ctx.lineTo(-this.size/2, 0);   // Лево
                ctx.closePath();
                
                ctx.fillStyle = `rgba(168, 85, 247, ${this.opacity})`;
                ctx.shadowBlur = 15;
                ctx.shadowColor = 'rgba(168, 85, 247, 0.8)';
                ctx.fill();
                
                // Внутренний блик для объема
                ctx.fillStyle = `rgba(255, 255, 255, ${this.opacity * 0.5})`;
                ctx.beginPath();
                ctx.moveTo(0, -this.size);
                ctx.lineTo(this.size/2, 0);
                ctx.lineTo(0, 0);
                ctx.fill();

                ctx.restore();
            }
        }

        const crystals = [];
        for (let i = 0; i < 45; i++) crystals.push(new Crystal());

        function animateCrystals() {
            // Эффект затухания следа
            ctx.fillStyle = 'rgba(10, 10, 12, 0.3)';
            ctx.fillRect(0, 0, w, h);
            
            // Рисуем связи между близкими кристаллами
            for (let i = 0; i < crystals.length; i++) {
                crystals[i].update();
                crystals[i].draw();
                
                for (let j = i; j < crystals.length; j++) {
                    const dx = crystals[i].x - crystals[j].x;
                    const dy = crystals[i].y - crystals[j].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    
                    if (dist < 130) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(168, 85, 247, ${0.1 * (1 - dist/130)})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(crystals[i].x, crystals[i].y);
                        ctx.lineTo(crystals[j].x, crystals[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animateCrystals);
        }
        animateCrystals();

        // ================= 3. ЛОГИКА ИГРЫ "КУБИК" =================
        const diceEl = document.getElementById('dice-element');
        const logEl = document.getElementById('dice-log');
        let isRolling = false;

        // Конфигурация граней (какие точки включать)
        const diceFaces = {
            1: ['d-cc'],
            2: ['d-tl', 'd-br'],
            3: ['d-tl', 'd-cc', 'd-br'],
            4: ['d-tl', 'd-tr', 'd-bl', 'd-br'],
            5: ['d-tl', 'd-tr', 'd-cc', 'd-bl', 'd-br'],
            6: ['d-tl', 'd-tr', 'd-ml', 'd-mr', 'd-bl', 'd-br']
        };

        function setDiceFace(num) {
            // Выключаем все точки
            document.querySelectorAll('.dot').forEach(d => d.classList.remove('active'));
            // Включаем нужные
            diceFaces[num].forEach(id => document.getElementById(id).classList.add('active'));
        }

        // Ставим шестерку по умолчанию при загрузке
        setDiceFace(6);

        function playDice() {
            if (isRolling) return; // Защита от спама кликами
            isRolling = true;
            logEl.innerText = "Бросаем...";
            
            // Запускаем CSS анимацию
            diceEl.classList.remove('rolling');
            void diceEl.offsetWidth; // Магический трюк для перезапуска анимации
            diceEl.classList.add('rolling');

            // Во время полета быстро меняем грани
            let shuffleInterval = setInterval(() => {
                setDiceFace(Math.floor(Math.random() * 6) + 1);
            }, 100);

            // Остановка через 1.2 секунды (длина CSS анимации)
            setTimeout(() => {
                clearInterval(shuffleInterval);
                const result = Math.floor(Math.random() * 6) + 1;
                setDiceFace(result);
                
                // Сообщения в зависимости от результата
                if (result === 6) logEl.innerText = "🔥 ШЕСТЬ! ДЖЕКПОТ!";
                else if (result === 1) logEl.innerText = "💀 Единица... Не повезло.";
                else logEl.innerText = `Выпало: ${result}`;
                
                diceEl.classList.remove('rolling');
                isRolling = false;
            }, 1200);
        }

        // ================= 4. СТАТУС СЕРВЕРА (ПОРТ 44380) =================
        const serverAddress = 'MysteryTimeServer.aternos.me';
        const serverPort = 44380;

        async function checkServer() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            text.innerText = "ПИНГУЮ...";

            try {
                // Прямой запрос с портом к надежному API
                const res = await fetch(`https://api.mcstatus.io/v2/status/java/${serverAddress}:${serverPort}`);
                const data = await res.json();

                if (data.online) {
                    dot.className = 'online';
                    text.innerHTML = `ОНЛАЙН: <span style="color:white">${data.players.online}</span> / ${data.players.max}`;
                } else {
                    // Запасной API
                    const res2 = await fetch(`https://mcapi.us/server/status?ip=${serverAddress}&port=${serverPort}`);
                    const data2 = await res2.json();
                    if (data2.online) {
                        dot.className = 'online';
                        text.innerHTML = `ОНЛАЙН: <span style="color:white">${data2.players.now}</span> / ${data2.players.max}`;
                    } else {
                        dot.className = 'offline';
                        text.innerText = 'СЕРВЕР OFFLINE';
                    }
                }
            } catch (e) {
                dot.className = 'offline';
                text.innerText = 'ОШИБКА ПОДКЛЮЧЕНИЯ';
            }
        }

        // ================= 5. УТИЛИТЫ =================
        function copyIP() {
            navigator.clipboard.writeText(`${serverAddress}:${serverPort}`).then(() => {
                const btn = document.getElementById('ip-btn');
                btn.innerText = 'IP СКОПИРОВАН!';
                setTimeout(() => btn.innerText = 'Копировать IP', 2000);
            });
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        // Запускаем проверку при загрузке
        checkServer();
    </script>
</body>
</html>
