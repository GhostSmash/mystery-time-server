<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>MYSTERY TIME | V1ZER EDITION</title>
    
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&family=Silkscreen:wght@400;700&display=swap" rel="stylesheet">

    <style>
        :root {
            --p: #b066ff;
            --p-glow: rgba(176, 102, 255, 0.6);
            --bg: #030307;
            --border: rgba(176, 102, 255, 0.4);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; user-select: none; -webkit-tap-highlight-color: transparent; }
        body { background: var(--bg); color: #fff; height: 100vh; overflow: hidden; font-family: 'Silkscreen', sans-serif; }

        /* MESH GRID BACKGROUND */
        #bg-canvas { position: fixed; top: 0; left: 0; z-index: 1; }

        /* AMETHYSTS */
        .crystal {
            position: fixed; width: 140px; z-index: 5;
            filter: drop-shadow(0 0 30px var(--p-glow));
            pointer-events: none; animation: crystal-float 5s ease-in-out infinite;
        }
        .c-left { bottom: -20px; left: -20px; transform: rotate(15deg); }
        .c-right { bottom: -20px; right: -20px; transform: rotate(-15deg) scaleX(-1); }

        @keyframes crystal-float { 0%, 100% { transform: translateY(0) rotate(15deg); } 50% { transform: translateY(-20px) rotate(20deg); } }

        /* LIQUID GLASS PANEL */
        .glass-frame {
            position: relative; z-index: 20;
            width: 94vw; max-width: 550px; height: 92vh;
            margin: 4vh auto;
            background: linear-gradient(165deg, rgba(255,255,255,0.07) 0%, rgba(255,255,255,0.01) 100%);
            backdrop-filter: blur(45px) saturate(160%);
            -webkit-backdrop-filter: blur(45px) saturate(160%);
            border: 1px solid var(--border);
            border-radius: 40px;
            display: flex; flex-direction: column; overflow: hidden;
            box-shadow: 0 40px 80px rgba(0,0,0,0.8);
        }

        .header { padding: 30px 20px; text-align: center; }
        .header h1 { 
            font-family: 'Press Start 2P', cursive; font-size: 1.1rem; 
            background: linear-gradient(#fff, var(--p)); -webkit-background-clip: text; -webkit-text-fill-color: transparent;
            filter: drop-shadow(0 0 10px var(--p));
        }

        /* NAVIGATION */
        .nav { display: flex; padding: 10px; gap: 10px; background: rgba(0,0,0,0.2); }
        .nav-tab { 
            flex: 1; padding: 16px; border-radius: 20px; border: none; 
            background: rgba(255,255,255,0.02); color: #666; 
            font-family: 'Press Start 2P'; font-size: 0.5rem; cursor: pointer; transition: 0.3s;
        }
        .nav-tab.active { background: var(--p); color: #fff; box-shadow: 0 0 20px var(--p-glow); }

        .content { flex: 1; overflow-y: auto; padding: 20px; display: none; }
        .content.active { display: block; }

        /* STATUS BOX */
        .status-box { background: rgba(0,0,0,0.4); border: 1px solid var(--border); border-radius: 25px; padding: 20px; text-align: center; margin-bottom: 20px; }
        #st-text { font-size: 0.9rem; color: var(--p); font-weight: bold; }

        .btn { 
            display: block; width: 100%; padding: 18px; margin: 10px 0; border-radius: 20px; 
            border: 1px solid var(--p); background: rgba(176, 102, 255, 0.05); color: #fff; 
            font-family: 'Silkscreen'; text-align: center; text-decoration: none; cursor: pointer; font-size: 0.8rem;
        }
        .btn:active { transform: scale(0.98); background: var(--p); }

        /* STAFF SECTION */
        .staff-card { margin-bottom: 10px; padding: 12px; background: rgba(255,255,255,0.03); border-radius: 18px; border: 1px solid rgba(176, 102, 255, 0.15); display: flex; justify-content: space-between; align-items: center; }
        .staff-info p { font-size: 0.7rem; font-weight: bold; }
        .staff-info span { font-size: 0.5rem; color: var(--p); }

        /* GAMES */
        .grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .node { background: rgba(255,255,255,0.03); border: 1px solid rgba(255,255,255,0.1); border-radius: 22px; padding: 20px; text-align: center; cursor: pointer; }

        #loader { display: none; position: absolute; top: 0; left: 0; width: 100%; height: 100%; background: rgba(3,3,7,0.98); z-index: 100; flex-direction: column; align-items: center; justify-content: center; padding: 40px; }
        .bar-bg { width: 100%; height: 8px; background: #111; border-radius: 10px; margin: 20px 0; overflow: hidden; }
        .bar-fill { height: 100%; width: 0%; background: var(--p); transition: width 0.1s linear; }

        #game-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: #000; z-index: 1000; display: none; flex-direction: column; }
        iframe { flex: 1; border: none; }
    </style>
</head>
<body>

<canvas id="bg-canvas"></canvas>
<img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/f/f1/Amethyst_Cluster_JE2_BE2.png" class="crystal c-left">
<img src="https://static.wikia.nocookie.net/minecraft_gamepedia/images/f/f1/Amethyst_Cluster_JE2_BE2.png" class="crystal c-right">

<div class="glass-frame">
    <div class="header">
        <h1>MYSTERY TIME</h1>
        <p style="font-size: 0.5rem; color: var(--p); margin-top: 5px; letter-spacing: 2px;">V1ZER ULTIMATE HUB</p>
    </div>

    <div class="nav">
        <button class="nav-tab active" onclick="tab(0)">HUB</button>
        <button class="nav-tab" onclick="tab(1)">GAMES</button>
    </div>

    <div class="content active" id="t0">
        <div class="status-box">
            <div id="st-text">PINGING SERVER...</div>
            <div id="st-info" style="font-size: 0.5rem; opacity: 0.6; margin-top: 5px;">MYSTERYTIMESERVER.ATERNOS.ME</div>
        </div>

        <button class="btn" onclick="copyIP()">📋 COPY IP (44380)</button>
        <a href="https://www.mediafire.com/file/h3024nacqdfhl9b/sborka_1.21.4.mrpack/file" class="btn" style="border-color:#fff;">📦 MODPACK 1.21.4</a>

        <div style="margin-top: 20px;">
            <p style="font-size: 0.6rem; color: var(--p); margin-bottom: 10px;">STAFF & PROJECT TEAM:</p>
            
            <div class="staff-card">
                <div class="staff-info">
                    <p>v1zer</p>
                    <span>Owner & Developer</span>
                </div>
                <a href="https://t.me/xssmash" class="btn" style="width: auto; padding: 6px 12px; margin: 0; font-size: 0.5rem; border-radius: 10px;">TG</a>
            </div>

            <div class="staff-card">
                <div class="staff-info">
                    <p>Oscolo4ek</p>
                    <span>Dev & Streamer</span>
                </div>
                <a href="https://t.me/wowoleg1" class="btn" style="width: auto; padding: 6px 12px; margin: 0; font-size: 0.5rem; border-radius: 10px;">TG</a>
            </div>
        </div>
    </div>

    <div class="content" id="t1">
        <div class="grid" id="grid"></div>
        <div id="loader">
            <div id="l-icon" style="font-size: 3rem;">📦</div>
            <div id="l-name" style="font-size: 0.6rem; font-family:'Press Start 2P'; margin-top: 15px;">INITIALIZING</div>
            <div class="bar-bg"><div id="l-fill" class="bar-fill"></div></div>
            <div id="l-stats" style="font-size: 0.5rem; opacity: 0.5;">0.0 / 0.0 MB</div>
            <div id="l-hash" style="font-size: 0.4rem; color: var(--p); margin-top: 10px; font-family: monospace;">HASH: READY</div>
        </div>
    </div>
</div>

<div id="game-overlay">
    <button onclick="closeGame()" style="padding: 20px; background: var(--p); border: none; color: #fff; font-family: 'Press Start 2P'; font-size: 0.7rem;">EXIT TO HUB [X]</button>
    <iframe id="game-frame"></iframe>
</div>

<script>
    // --- OLD SCHOOL MESH BACKGROUND (60 FPS) ---
    const canvas = document.getElementById('bg-canvas');
    const ctx = canvas.getContext('2d');
    let w, h, pts = [];

    function init() {
        w = canvas.width = window.innerWidth;
        h = canvas.height = window.innerHeight;
        pts = [];
        for (let i = 0; i < 50; i++) {
            pts.push({
                x: Math.random() * w,
                y: Math.random() * h,
                vx: (Math.random() - 0.5) * 0.8,
                vy: (Math.random() - 0.5) * 0.8
            });
        }
    }

    function draw() {
        ctx.clearRect(0, 0, w, h);
        ctx.fillStyle = '#030307';
        ctx.fillRect(0,0,w,h);

        for (let i = 0; i < pts.length; i++) {
            let p = pts[i];
            p.x += p.vx; p.y += p.vy;

            if (p.x < 0 || p.x > w) p.vx *= -1;
            if (p.y < 0 || p.y > h) p.vy *= -1;

            ctx.fillStyle = 'rgba(176, 102, 255, 0.4)';
            ctx.beginPath(); ctx.arc(p.x, p.y, 2, 0, Math.PI * 2); ctx.fill();

            for (let j = i + 1; j < pts.length; j++) {
                let p2 = pts[j];
                let dist = Math.hypot(p.x - p2.x, p.y - p2.y);
                if (dist < 150) {
                    ctx.strokeStyle = `rgba(176, 102, 255, ${1 - dist / 150})`;
                    ctx.lineWidth = 0.5;
                    ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                }
            }
        }
        requestAnimationFrame(draw);
    }
    window.addEventListener('resize', init);
    init(); draw();

    // --- GAMES DATA (STABLE LINKS) ---
    const gList = [
        { n: 'Slope', u: 'https://krunker.io/', s: 15.4, i: '🚀' }, // Krunker вместо слоуп для стабильности
        { n: 'Minecraft', u: 'https://classic.minecraft.net/', s: 18.5, i: '⛏️' },
        { n: 'Voxiom', u: 'https://voxiom.io/', s: 12.2, i: '🔫' },
        { n: 'ShellShock', u: 'https://shellshock.io/', s: 12.8, i: '🥚' },
        { n: 'Flappy', u: 'https://flappybird.io/', s: 2.1, i: '🐦' },
        { n: '2048', u: 'https://play2048.co/', s: 1.5, i: '🔢' },
        { n: 'Hextris', u: 'https://hextris.io/', s: 3.2, i: '⬢' },
        { n: 'DoodleJump', u: 'https://doodle-jump.io/', s: 4.5, i: '🐸' }
    ];

    const grid = document.getElementById('grid');
    gList.forEach(g => {
        grid.innerHTML += `<div class="node" onclick="hload('${g.n}', '${g.u}', ${g.s}, '${g.i}')"><span>${g.i}</span><p style="font-size:0.5rem; margin-top:5px;">${g.n}</p></div>`;
    });

    // --- LOADING ENGINE ---
    async function hload(name, url, size, icon) {
        const loader = document.getElementById('loader');
        const fill = document.getElementById('l-fill');
        const stats = document.getElementById('l-stats');
        const hdisp = document.getElementById('l-hash');
        
        loader.style.display = 'flex';
        document.getElementById('l-icon').innerText = icon;
        document.getElementById('l-name').innerText = `DOWNLOADING ${name}...`;

        let current = 0;
        const target = size * 1024 * 1024;
        const start = Date.now();
        let ram = [];

        while (current < target) {
            try {
                await fetch(`https://picsum.photos/400?r=${Math.random()}`);
                current += 500000;
            } catch(e) { current += 250000; }

            let hash = "";
            for(let i=0; i<30000; i++) {
                hash = btoa(Math.random().toString()).substring(0, 16);
                if(i % 5000 === 0) ram.push(new Array(500).fill("STRESS"));
            }

            const prog = (current / target) * 100;
            fill.style.width = Math.min(prog, 100) + '%';
            stats.innerText = `${(current/1024/1024).toFixed(1)} / ${size} MB`;
            hdisp.innerText = `HASH: ${hash}`;

            if(prog >= 100) break;
            await new Promise(r => setTimeout(r, 60));
        }

        ram = null;
        setTimeout(() => {
            loader.style.display = 'none';
            document.getElementById('game-overlay').style.display = 'flex';
            document.getElementById('game-frame').src = url;
        }, 500);
    }

    function tab(i) {
        document.querySelectorAll('.nav-tab, .content').forEach(e => e.classList.remove('active'));
        document.querySelectorAll('.nav-tab')[i].classList.add('active');
        document.getElementById('t'+i).classList.add('active');
    }

    async function check() {
        const t = document.getElementById('st-text');
        try {
            const res = await fetch(`https://api.mcstatus.io/v2/status/java/MysteryTimeServer.aternos.me:44380?t=${Date.now()}`);
            const d = await r.json();
            t.innerText = d.online ? "SERVER ONLINE" : "SERVER OFFLINE";
            t.style.color = d.online ? "#00ffaa" : "#ff4444";
        } catch(e) { t.innerText = "STATUS: CHECKING"; }
    }
    check(); setInterval(check, 30000);

    function closeGame() { document.getElementById('game-overlay').style.display='none'; document.getElementById('game-frame').src=''; }
    function copyIP() { navigator.clipboard.writeText("MysteryTimeServer.aternos.me:44380"); alert("IP Copied!"); }
</script>
</body>
</html>
