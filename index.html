<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Time | Portal</title>
    <style>
        :root {
            --primary: #a855f7;
            --bg: #0a0a0c;
            --glass: rgba(168, 85, 247, 0.1);
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        body, html { 
            height: 100%; overflow-x: hidden; 
            background: var(--bg);
            font-family: 'Segoe UI', Roboto, sans-serif; color: white; 
        }
        
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .main-wrapper { 
            position: relative; z-index: 2; min-height: 100vh;
            display: flex; align-items: center; justify-content: center; padding: 20px;
        }
        
        /* LIQUID GLASS PANEL */
        .glass-panel { 
            background: var(--glass); 
            backdrop-filter: blur(20px); 
            -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(168, 85, 247, 0.3); 
            padding: 40px; 
            border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5);
            width: 100%; max-width: 600px;
            text-align: center;
            animation: morph 12s ease-in-out infinite;
        }

        @keyframes morph {
            0%, 100% { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; }
            50% { border-radius: 40% 60% 35% 65% / 55% 45% 55% 45%; }
        }
        
        h1 { 
            font-size: clamp(2rem, 8vw, 3.5rem); text-transform: uppercase; 
            color: var(--primary); text-shadow: 0 0 20px rgba(168, 85, 247, 0.6); 
        }
        
        .admin-tag { color: #888; font-size: 0.9rem; margin-bottom: 25px; letter-spacing: 2px; }

        /* BUTTONS GRID */
        .btn-grid { 
            display: grid; grid-template-columns: 1fr 1fr; gap: 15px; margin-top: 20px; 
        }

        .btn { 
            background: rgba(168, 85, 247, 0.15); color: #fff; border: 1px solid var(--primary); 
            padding: 12px; font-family: inherit; cursor: pointer; border-radius: 12px;
            text-transform: uppercase; font-weight: bold; transition: 0.3s; font-size: 0.8rem;
        }
        
        .btn:hover { background: var(--primary); transform: translateY(-2px); box-shadow: 0 5px 15px rgba(168, 85, 247, 0.4); }
        .btn-full { grid-column: span 2; }

        /* STATUS BOX */
        .status-box { 
            margin-top: 25px; background: rgba(0,0,0,0.4); padding: 15px; border-radius: 20px;
            display: flex; align-items: center; justify-content: center; gap: 10px;
        }

        #status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .online { background: #00ffaa; box-shadow: 0 0 10px #00ffaa; }
        .offline { background: #ff4444; box-shadow: 0 0 10px #ff4444; }

        /* MODAL / OVERLAY */
        .overlay {
            position: fixed; top: 0; left: 0; width: 100%; height: 100%;
            background: rgba(0,0,0,0.85); z-index: 10; display: none;
            align-items: center; justify-content: center; backdrop-filter: blur(5px);
        }
        .modal {
            background: #1a1a20; padding: 30px; border-radius: 20px; border: 1px solid var(--primary);
            text-align: center; width: 90%; max-width: 400px;
        }

        /* DICE GAME */
        #dice-result { font-size: 2rem; margin-top: 10px; color: var(--primary); }

        @media (max-width: 480px) { .btn-grid { grid-template-columns: 1fr; } .btn-full { grid-column: span 1; } }
    </style>
</head>
<body>

    <canvas id="canvas-container"></canvas>

    <div class="main-wrapper">
        <div class="glass-panel">
            <h1>Mystery Time</h1>
            <div class="admin-tag">CREATED BY SMASHH</div>
            
            <div class="btn-grid">
                <button class="btn btn-full" onclick="copyIP()" id="ip-btn">Копировать IP</button>
                <button class="btn" onclick="toggleModal('admin-modal')">Админы</button>
                <button class="btn" onclick="rollDice()">Бросить кубик 🎲</button>
                <button class="btn btn-full" onclick="checkServer()">Обновить статус 🔄</button>
            </div>

            <div class="status-box">
                <div id="status-dot" class="offline"></div>
                <span id="status-text">ПРОВЕРКА...</span>
            </div>
            
            <div id="dice-result"></div>
        </div>
    </div>

    <div id="admin-modal" class="overlay" onclick="toggleModal('admin-modal')">
        <div class="modal" onclick="event.stopPropagation()">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Состав Администрации</h2>
            <p style="margin-bottom: 10px;">👑 <b>Главный админ:</b> Smashh</p>
            <p>🛡️ <b>Админ:</b> Oscolo4ek</p>
            <br>
            <button class="btn" onclick="toggleModal('admin-modal')">Закрыть</button>
        </div>
    </div>

    <script>
        // --- GRAPHICS ---
        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        const particles = [];

        window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });

        class Particle {
            constructor() {
                this.x = Math.random() * w; this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 0.6; this.vy = (Math.random() - 0.5) * 0.6;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > w) this.vx *= -1;
                if (this.y < 0 || this.y > h) this.vy *= -1;
            }
            draw() {
                ctx.beginPath(); ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = '#a855f7'; ctx.fill();
            }
        }

        for (let i = 0; i < 40; i++) particles.push(new Particle());

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 12, 0.2)';
            ctx.fillRect(0, 0, w, h);
            particles.forEach(p => {
                p.update(); p.draw();
                particles.forEach(p2 => {
                    const d = Math.hypot(p.x - p2.x, p.y - p2.y);
                    if (d < 120) {
                        ctx.strokeStyle = `rgba(168, 85, 247, ${0.15 * (1 - d/120)})`;
                        ctx.beginPath(); ctx.moveTo(p.x, p.y); ctx.lineTo(p2.x, p2.y); ctx.stroke();
                    }
                });
            });
            requestAnimationFrame(animate);
        }
        animate();

        // --- SERVER API ---
        const serverIP = 'MysteryTimeServer.aternos.me';

        async function checkServer() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            text.innerText = "ПИНГУЮ...";

            try {
                const res = await fetch(`https://api.mcstatus.io/v2/status/java/${serverIP}`);
                const data = await res.json();

                if (data.online) {
                    dot.className = 'online';
                    text.innerHTML = `ОНЛАЙН: ${data.players.online} / ${data.players.max}`;
                } else {
                    dot.className = 'offline';
                    text.innerText = 'СЕРВЕР OFFLINE';
                }
            } catch (e) {
                dot.className = 'offline';
                text.innerText = 'ОШИБКА API';
            }
        }

        // --- UI FUNCTIONS ---
        function copyIP() {
            navigator.clipboard.writeText(serverIP).then(() => {
                const btn = document.getElementById('ip-btn');
                btn.innerText = 'IP СКОПИРОВАН!';
                setTimeout(() => btn.innerText = 'Копировать IP', 2000);
            });
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        function rollDice() {
            const res = document.getElementById('dice-result');
            const val = Math.floor(Math.random() * 6) + 1;
            res.innerText = `🎲 ${val}`;
            res.style.transform = "scale(1.2)";
            setTimeout(() => res.style.transform = "scale(1)", 200);
        }

        checkServer();
        setInterval(checkServer, 60000);
    </script>
</body>
</html>
