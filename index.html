<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Time | Live</title>
    <style>
        :root { --primary: #a855f7; --bg: #0a0a0c; }
        * { box-sizing: border-box; margin: 0; padding: 0; }
        body, html { height: 100%; overflow-x: hidden; background: var(--bg); font-family: 'Segoe UI', sans-serif; color: white; }
        #canvas-container { position: fixed; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .main-wrapper { position: relative; z-index: 2; min-height: 100vh; display: flex; align-items: center; justify-content: center; padding: 20px; }
        
        .glass-panel { 
            background: rgba(168, 85, 247, 0.1); backdrop-filter: blur(20px); -webkit-backdrop-filter: blur(20px);
            border: 1px solid rgba(168, 85, 247, 0.3); padding: 40px; border-radius: 50px;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5); width: 100%; max-width: 550px; text-align: center;
        }

        h1 { font-size: clamp(2rem, 8vw, 3rem); text-transform: uppercase; color: var(--primary); text-shadow: 0 0 20px rgba(168, 85, 247, 0.6); margin-bottom: 5px; }
        .admin-tag { color: #888; font-size: 0.8rem; margin-bottom: 20px; letter-spacing: 2px; }

        .btn-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }
        .btn { 
            background: rgba(168, 85, 247, 0.15); color: #fff; border: 1px solid var(--primary); 
            padding: 12px; cursor: pointer; border-radius: 12px; text-transform: uppercase; 
            font-weight: bold; transition: 0.3s; font-size: 0.75rem;
        }
        .btn:hover { background: var(--primary); transform: translateY(-2px); }
        .btn-full { grid-column: span 2; }

        /* --- АНИМАЦИЯ КУБИКА (TG STYLE) --- */
        .dice-container { margin: 25px 0; perspective: 1000px; display: flex; justify-content: center; }
        .cube {
            width: 60px; height: 60px; position: relative; transform-style: preserve-3d;
            transform: rotateX(-20deg) rotateY(-20deg); transition: transform 1.5s cubic-bezier(0.17, 0.67, 0.83, 0.67);
        }
        .face {
            position: absolute; width: 60px; height: 60px; background: white; border: 2px solid #ddd;
            border-radius: 10px; display: flex; align-items: center; justify-content: center;
            font-size: 1.5rem; color: #333; box-shadow: inset 0 0 10px rgba(0,0,0,0.1);
        }
        .front  { transform: translateZ(30px); }
        .back   { transform: rotateY(180deg) translateZ(30px); }
        .right  { transform: rotateY(90deg) translateZ(30px); }
        .left   { transform: rotateY(-90deg) translateZ(30px); }
        .top    { transform: rotateX(90deg) translateZ(30px); }
        .bottom { transform: rotateX(-90deg) translateZ(30px); }

        .dot { width: 10px; height: 10px; background: #333; border-radius: 50%; position: absolute; }
        /* Точки для граней (упрощенно) */
        .face-1 .dot { top: 25px; left: 25px; }
        .face-6 .dot:nth-child(1) { top: 10px; left: 10px; }
        .face-6 .dot:nth-child(2) { top: 10px; left: 40px; }
        .face-6 .dot:nth-child(3) { top: 25px; left: 10px; }
        .face-6 .dot:nth-child(4) { top: 25px; left: 40px; }
        .face-6 .dot:nth-child(5) { top: 40px; left: 10px; }
        .face-6 .dot:nth-child(6) { top: 40px; left: 40px; }

        /* STATUS */
        .status-box { margin-top: 20px; background: rgba(0,0,0,0.4); padding: 12px; border-radius: 15px; display: flex; align-items: center; justify-content: center; gap: 10px; }
        #status-dot { width: 10px; height: 10px; border-radius: 50%; }
        .online { background: #00ffaa; box-shadow: 0 0 10px #00ffaa; }
        .offline { background: #ff4444; box-shadow: 0 0 10px #ff4444; }

        /* MODAL */
        .overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: rgba(0,0,0,0.85); z-index: 10; display: none; align-items: center; justify-content: center; backdrop-filter: blur(5px); }
        .modal { background: #1a1a20; padding: 30px; border-radius: 20px; border: 1px solid var(--primary); text-align: center; width: 90%; max-width: 400px; }
    </style>
</head>
<body>

    <canvas id="canvas-container"></canvas>

    <div class="main-wrapper">
        <div class="glass-panel">
            <h1>Mystery Time</h1>
            <div class="admin-tag">CREATED BY SMASHH</div>
            
            <div class="btn-grid">
                <button class="btn btn-full" onclick="copyIP()" id="ip-btn">Копировать IP</button>
                <button class="btn" onclick="toggleModal('admin-modal')">Админы</button>
                <button class="btn" onclick="rollDice()">Кинуть кубик 🎲</button>
                <button class="btn btn-full" onclick="checkServer()">Обновить статус 🔄</button>
            </div>

            <div class="dice-container">
                <div class="cube" id="cube">
                    <div class="face front face-1"><div class="dot"></div></div>
                    <div class="face back face-6">
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                        <div class="dot"></div><div class="dot"></div><div class="dot"></div>
                    </div>
                    <div class="face right">3</div>
                    <div class="face left">4</div>
                    <div class="face top">2</div>
                    <div class="face bottom">5</div>
                </div>
            </div>

            <div class="status-box">
                <div id="status-dot" class="offline"></div>
                <span id="status-text">ЗАГРУЗКА...</span>
            </div>
        </div>
    </div>

    <div id="admin-modal" class="overlay" onclick="toggleModal('admin-modal')">
        <div class="modal" onclick="event.stopPropagation()">
            <h2 style="color: var(--primary); margin-bottom: 20px;">Администрация</h2>
            <p style="margin-bottom: 10px;">👑 <b>Главный:</b> Smashh</p>
            <p>🛡️ <b>Админ:</b> Oscolo4ek</p><br>
            <button class="btn" onclick="toggleModal('admin-modal')">Закрыть</button>
        </div>
    </div>

    <script>
        // --- BACKGROUND ---
        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        const particles = [];
        window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });

        class Particle {
            constructor() { this.x = Math.random()*w; this.y = Math.random()*h; this.vx = (Math.random()-0.5)*0.5; this.vy = (Math.random()-0.5)*0.5; }
            update() { this.x+=this.vx; this.y+=this.vy; if(this.x<0||this.x>w)this.vx*=-1; if(this.y<0||this.y>h)this.vy*=-1; }
            draw() { ctx.beginPath(); ctx.arc(this.x,this.y,1.2,0,Math.PI*2); ctx.fillStyle='#a855f7'; ctx.fill(); }
        }
        for(let i=0; i<40; i++) particles.push(new Particle());
        function animate() {
            ctx.fillStyle='rgba(10,10,12,0.2)'; ctx.fillRect(0,0,w,h);
            particles.forEach(p => { p.update(); p.draw(); });
            requestAnimationFrame(animate);
        }
        animate();

        // --- SERVER API С ПОРТОМ 44380 ---
        const serverIP = 'MysteryTimeServer.aternos.me:44380';

        async function checkServer() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            text.innerText = "ПРОВЕРЯЮ СТАТУС...";
            try {
                const res = await fetch(`https://api.mcstatus.io/v2/status/java/${serverIP}`);
                const data = await res.json();
                if (data.online) {
                    dot.className = 'online';
                    text.innerHTML = `ОНЛАЙН: ${data.players.online} / ${data.players.max}`;
                } else {
                    dot.className = 'offline';
                    text.innerText = 'СЕРВЕР OFFLINE';
                }
            } catch (e) {
                dot.className = 'offline';
                text.innerText = 'ОШИБКА API';
            }
        }

        // --- DICE LOGIC ---
        function rollDice() {
            const cube = document.getElementById('cube');
            const xRand = Math.floor(Math.random() * 4) * 90 + 720;
            const yRand = Math.floor(Math.random() * 4) * 90 + 720;
            cube.style.transform = `rotateX(${xRand}deg) rotateY(${yRand}deg)`;
        }

        function copyIP() {
            navigator.clipboard.writeText('MysteryTimeServer.aternos.me:44380').then(() => {
                const btn = document.getElementById('ip-btn');
                btn.innerText = 'IP СКОПИРОВАН!';
                setTimeout(() => btn.innerText = 'Копировать IP', 2000);
            });
        }

        function toggleModal(id) {
            const m = document.getElementById(id);
            m.style.display = (m.style.display === 'flex') ? 'none' : 'flex';
        }

        checkServer();
        setInterval(checkServer, 60000);
    </script>
</body>
</html>
