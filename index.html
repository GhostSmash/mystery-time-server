<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mystery Time | Live Status</title>
    <style>
        body, html { 
            margin: 0; padding: 0; height: 100%; overflow: hidden; 
            background: #0a0a0c;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; color: white; 
        }
        
        #canvas-container { position: absolute; top: 0; left: 0; width: 100%; height: 100%; z-index: 1; }
        
        .ui-container { 
            position: relative; z-index: 2; display: flex; flex-direction: column; 
            align-items: center; justify-content: center; height: 100%; text-align: center; 
        }
        
        .glass-panel { 
            background: rgba(168, 85, 247, 0.1); 
            backdrop-filter: blur(25px); 
            -webkit-backdrop-filter: blur(25px);
            border: 1px solid rgba(168, 85, 247, 0.3); 
            padding: 50px 40px; 
            border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%;
            box-shadow: 0 20px 50px rgba(0, 0, 0, 0.5), inset 0 0 20px rgba(168, 85, 247, 0.1);
            max-width: 85%;
            animation: morph 10s ease-in-out infinite;
        }

        @keyframes morph {
            0%, 100% { border-radius: 60% 40% 70% 30% / 50% 60% 40% 50%; }
            50% { border-radius: 40% 60% 35% 65% / 55% 45% 55% 45%; }
        }
        
        h1 { 
            font-size: 2.8em; text-transform: uppercase; letter-spacing: 4px; margin: 0;
            color: #a855f7;
            text-shadow: 0 0 20px rgba(168, 85, 247, 0.6); 
        }
        
        p { color: #888; margin-top: 10px; margin-bottom: 30px; font-size: 0.9em; letter-spacing: 2px; }
        
        .btn { 
            background: rgba(168, 85, 247, 0.2); color: #fff; border: 1px solid #a855f7; 
            padding: 15px 35px; font-family: inherit; cursor: pointer; border-radius: 50px;
            text-transform: uppercase; font-weight: bold; transition: 0.3s;
        }
        
        .btn:hover { background: #a855f7; box-shadow: 0 0 30px #a855f7; transform: translateY(-3px); }

        .status { 
            margin-top: 30px; font-size: 1em; font-weight: bold; 
            background: rgba(0,0,0,0.3); padding: 10px 20px; border-radius: 30px;
            display: inline-block;
        }

        #status-dot { margin-right: 8px; font-size: 1.2em; }
        .online { color: #00ffaa; text-shadow: 0 0 10px #00ffaa; }
        .offline { color: #ff4444; text-shadow: 0 0 10px #ff4444; }

        @keyframes pulse { 0% { opacity: 1; } 50% { opacity: 0.4; } 100% { opacity: 1; } }
        .pulse-animation { animation: pulse 2s infinite; }
    </style>
</head>
<body>

    <canvas id="canvas-container"></canvas>

    <div class="ui-container">
        <div class="glass-panel">
            <h1>Mystery Time</h1>
            <p>ADMIN: <span style="color: #a855f7; font-weight: bold;">Smashh</span></p>
            
            <button class="btn" onclick="copyIP()" id="ip-btn">Copy IP</button>
            
            <div class="status" id="server-status">
                <span id="status-dot" class="pulse-animation">●</span> 
                <span id="status-text">PINGING SERVER...</span>
            </div>
        </div>
    </div>

    <script>
        // --- 1. ФОН ---
        const canvas = document.getElementById('canvas-container');
        const ctx = canvas.getContext('2d');
        let w = canvas.width = window.innerWidth;
        let h = canvas.height = window.innerHeight;
        const particles = [];
        window.addEventListener('resize', () => { w = canvas.width = window.innerWidth; h = canvas.height = window.innerHeight; });

        class Particle {
            constructor() {
                this.x = Math.random() * w;
                this.y = Math.random() * h;
                this.vx = (Math.random() - 0.5) * 0.8;
                this.vy = (Math.random() - 0.5) * 0.8;
            }
            update() {
                this.x += this.vx; this.y += this.vy;
                if (this.x < 0 || this.x > w) this.vx *= -1;
                if (this.y < 0 || this.y > h) this.vy *= -1;
            }
            draw() {
                ctx.beginPath();
                ctx.arc(this.x, this.y, 1.5, 0, Math.PI * 2);
                ctx.fillStyle = '#a855f7';
                ctx.fill();
            }
        }

        for (let i = 0; i < 50; i++) particles.push(new Particle());

        function animate() {
            ctx.fillStyle = 'rgba(10, 10, 12, 0.15)';
            ctx.fillRect(0, 0, w, h);
            for (let i = 0; i < particles.length; i++) {
                particles[i].update();
                particles[i].draw();
                for (let j = i; j < particles.length; j++) {
                    const dx = particles[i].x - particles[j].x;
                    const dy = particles[i].y - particles[j].y;
                    const dist = Math.sqrt(dx*dx + dy*dy);
                    if (dist < 150) {
                        ctx.beginPath();
                        ctx.strokeStyle = `rgba(168, 85, 247, ${0.2 * (1 - dist/150)})`;
                        ctx.lineWidth = 1;
                        ctx.moveTo(particles[i].x, particles[i].y);
                        ctx.lineTo(particles[j].x, particles[j].y);
                        ctx.stroke();
                    }
                }
            }
            requestAnimationFrame(animate);
        }
        animate();

        // --- 2. LIVE STATUS (IP: MysteryTimeServer.aternos.me) ---
        async function checkServer() {
            const dot = document.getElementById('status-dot');
            const text = document.getElementById('status-text');
            const ip = 'MysteryTimeServer.aternos.me';

            try {
                // Пытаемся получить данные через mcapi.us (он стабильнее для Aternos)
                const res = await fetch(`https://mcapi.us/server/status?ip=${ip}`);
                const data = await res.json();

                if (data.online) {
                    dot.className = 'online pulse-animation';
                    text.innerHTML = `ONLINE: <span style="color:white">${data.players.now}</span> / ${data.players.max}`;
                } else {
                    dot.className = 'offline';
                    text.innerText = 'SERVER OFFLINE';
                }
            } catch (e) {
                dot.className = 'offline';
                text.innerText = 'API DELAY...';
            }
        }

        checkServer();
        setInterval(checkServer, 30000);

        function copyIP() {
            navigator.clipboard.writeText('MysteryTimeServer.aternos.me').then(() => {
                const btn = document.getElementById('ip-btn');
                btn.innerText = 'COPIED!';
                setTimeout(() => { btn.innerText = 'Copy IP'; }, 2000);
            });
        }
    </script>
</body>
</html>
